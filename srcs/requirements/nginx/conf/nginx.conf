events {
    # Defines the maximum number of simultaneous connections per worker process.
    worker_connections 1024;
}

http {
    # Maps file extensions to MIME types so the browser renders them correctly (e.g., .css as text/css).
    include /etc/nginx/mime.types;

    server {
        # Listens strictly on port 443 for both IPv4 and IPv6, enforcing SSL.
        listen 443 ssl;
        listen [::]:443 ssl;

        # Defines the exact domain name this server block responds to.
        server_name mhirvasm.42.fr;

        # Enforces modern, secure TLS protocols. Older, compromised protocols are implicitly denied.
        ssl_protocols TLSv1.2 TLSv1.3;

        # Points to the self-signed certificate and private key we will generate in the init script.
        ssl_certificate /etc/nginx/ssl/inception.crt;
        ssl_certificate_key /etc/nginx/ssl/inception.key;

        # Sets the root directory for requests to the shared Docker volume mapped from the host.
        root /var/www/html;

        # Defines the default file to serve if a bare directory is requested.
        index index.php index.html;

        # Default location block: tries to serve the exact URI, then a directory, then falls back to a 404 error.
        location / {
            try_files $uri $uri/ =404;
        }

        # Intercepts all requests ending in .php and proxies them to the WordPress container.
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            # Forwards the FastCGI request over the Docker network to the 'wordpress' container on port 9000.
            fastcgi_pass wordpress:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            
            # Passes the absolute path of the requested script to PHP-FPM so it knows exactly what file to execute.
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }
}
