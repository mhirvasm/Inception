[www]
; 1. The User and Group
; Alpine Linux uses 'nobody' as the default unprivileged user for web services.
user = nobody
group = nobody

; 2. The Network Socket
; By default, PHP-FPM only listens to localhost (127.0.0.1). 
; We must force it to listen on 0.0.0.0 so NGINX can talk to it across the Docker network.
listen = 0.0.0.0:9000

; 3. Process Management
; This tells PHP-FPM how to scale its worker processes if your site gets a lot of traffic.
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; 4. Environment Variables (CRITICAL)
; By default, PHP-FPM deletes all environment variables for security. 
; If we don't set this to 'no', WordPress will not be able to see your database passwords!
clear_env = no
